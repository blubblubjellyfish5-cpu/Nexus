<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>THE DROP — Upload Wall</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* ── CSS Variables (ek jagah se poori site ka color change hoga) ── */
    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   #222;
      --accent:   #e8ff00;   /* neon yellow */
      --accent2:  #ff3c5f;   /* hot pink */
      --text:     #f0f0f0;
      --muted:    #555;
      --card-bg:  #161616;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      /* Subtle grid texture background */
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* ════════════════════════════════
       HEADER
    ════════════════════════════════ */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2rem;
      letter-spacing: 3px;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(232,255,0,0.4);
    }

    .logo span {
      color: var(--accent2);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    #file-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* Upload Button */
    #upload-trigger {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 10px 22px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 2px;
      cursor: pointer;
      clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #upload-trigger:hover {
      transform: scale(1.04);
      box-shadow: 0 0 20px rgba(232,255,0,0.5);
    }

    /* ════════════════════════════════
       UPLOAD MODAL (overlay)
    ════════════════════════════════ */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 480px;
      padding: 36px;
      position: relative;
      animation: slideUp 0.25s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    #modal h2 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem;
      letter-spacing: 3px;
      color: var(--accent);
      margin-bottom: 24px;
    }

    #modal label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
      font-family: 'DM Mono', monospace;
    }

    #modal input[type="text"] {
      width: 100%;
      background: #0a0a0a;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      margin-bottom: 20px;
      transition: border 0.2s;
    }
    #modal input[type="text"]:focus {
      border-color: var(--accent);
    }

    /* Drag & Drop Zone */
    #drop-zone {
      border: 2px dashed var(--border);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 20px;
      position: relative;
    }
    #drop-zone.dragover {
      border-color: var(--accent);
      background: rgba(232,255,0,0.04);
    }
    #drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    #drop-zone .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }
    #drop-zone p {
      color: var(--muted);
      font-size: 0.85rem;
    }
    #drop-zone .selected-file {
      color: var(--accent);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      margin-top: 8px;
    }

    /* Progress bar */
    #progress-wrap {
      display: none;
      background: var(--border);
      height: 3px;
      margin-bottom: 20px;
      overflow: hidden;
    }
    #progress-bar {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s;
    }

    /* Modal buttons */
    .modal-btns {
      display: flex;
      gap: 12px;
    }
    #submit-btn {
      flex: 1;
      background: var(--accent);
      color: #000;
      border: none;
      padding: 14px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #cancel-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 14px 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: border-color 0.2s;
    }
    #cancel-btn:hover { border-color: var(--accent2); color: var(--accent2); }

    #status-msg {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      margin-top: 12px;
      min-height: 18px;
      color: var(--accent);
    }
    #status-msg.error { color: var(--accent2); }

    /* ════════════════════════════════
       MAIN WALL
    ════════════════════════════════ */
    main {
      padding: 40px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .wall-header {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 32px;
    }
    .wall-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 4px;
      color: var(--muted);
    }
    .wall-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Masonry-style grid */
    #wall {
      columns: 4 280px;
      column-gap: 16px;
    }

    /* ── File Card ── */
    .file-card {
      break-inside: avoid;
      margin-bottom: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      animation: fadeIn 0.4s ease;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .file-card:hover {
      transform: translateY(-3px);
      border-color: var(--accent);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Preview area */
    .card-preview {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: #0d0d0d;
    }

    /* Non-image file placeholder */
    .file-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #0d0d0d;
    }
    .file-placeholder .file-emoji { font-size: 2.5rem; }
    .file-placeholder .file-ext {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--muted);
      text-transform: uppercase;
    }

    /* Video preview */
    .card-video {
      width: 100%;
      aspect-ratio: 16/9;
      display: block;
      background: #000;
    }

    /* Card footer */
    .card-footer {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
    }
    .card-filename {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }
    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-uploader {
      font-size: 0.68rem;
      color: var(--accent);
      font-family: 'DM Mono', monospace;
    }
    .card-uploader::before { content: "↑ "; }
    .card-time {
      font-size: 0.62rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    /* Download button on hover */
    .card-download {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.75);
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 5px 10px;
      font-size: 0.65rem;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1px;
      text-decoration: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .file-card:hover .card-download { opacity: 1; }

    /* Type badge */
    .type-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: var(--accent2);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 1px;
      padding: 3px 8px;
      text-transform: uppercase;
    }

    /* Empty state */
    #empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }
    #empty-state .big { font-size: 4rem; margin-bottom: 16px; }
    #empty-state p { font-family: 'DM Mono', monospace; font-size: 0.85rem; letter-spacing: 1px; }

    /* Loading */
    #loading {
      text-align: center;
      padding: 60px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 2px;
    }
    .blink { animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: var(--accent);
      color: #000;
      padding: 14px 20px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 1px;
      z-index: 999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error-toast { background: var(--accent2); color: #fff; }

    @media (max-width: 600px) {
      header { padding: 0 16px; }
      main { padding: 24px 16px; }
      .logo { font-size: 1.5rem; }
      #wall { columns: 2 140px; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ HEADER ══════════════════ -->
<header>
  <div class="logo">THE<span>.</span>DROP</div>
  <div class="header-right">
    <span id="file-count">— FILES</span>
    <button id="upload-trigger" onclick="openModal()">+ DROP IT</button>
  </div>
</header>

<!-- ══════════════════ UPLOAD MODAL ══════════════════ -->
<div id="modal-overlay">
  <div id="modal">
    <h2>Drop Your File</h2>

    <label>Your Name</label>
    <input type="text" id="uploader-name" placeholder="Anonymous..." maxlength="30"/>

    <label>File</label>
    <div id="drop-zone">
      <input type="file" id="file-input" onchange="onFileSelect(this)"/>
      <div class="drop-icon">📂</div>
      <p>Click karo ya drag & drop karo</p>
      <p>Images, Videos, PDFs, aur kuch bhi!</p>
      <div class="selected-file" id="selected-name"></div>
    </div>

    <div id="progress-wrap">
      <div id="progress-bar"></div>
    </div>

    <div class="modal-btns">
      <button id="submit-btn" onclick="uploadFile()" disabled>UPLOAD</button>
      <button id="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>

    <div id="status-msg"></div>
  </div>
</div>

<!-- ══════════════════ MAIN WALL ══════════════════ -->
<main>
  <div class="wall-header">
    <span class="wall-title">LIVE WALL</span>
    <div class="wall-line"></div>
  </div>

  <div id="loading"><span class="blink">■</span> LOADING DROPS...</div>
  <div id="wall"></div>
  <div id="empty-state" style="display:none">
    <div class="big">📭</div>
    <p>Koi drop nahi abhi. Pehle wale bano!</p>
  </div>
</main>

<!-- ══════════════════ TOAST ══════════════════ -->
<div id="toast"></div>

<script>
  // ============================================================
  // 🔑 APNI SUPABASE DETAILS YAHAN DAALO
  // ============================================================
  const SUPABASE_URL  = "APNI_SUPABASE_URL_YAHAN";
  const SUPABASE_ANON = "APNI_ANON_KEY_YAHAN";

  // ============================================================
  // 🔌 Supabase Client — ek baar connect karo, baar baar use karo
  // ============================================================
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  let selectedFile = null; // User ne jo file choose ki hai

  // ============================================================
  // 📂 File select hone pe — naam dikhao, button enable karo
  // ============================================================
  function onFileSelect(input) {
    if (input.files.length === 0) return;
    selectedFile = input.files[0];

    // File ka naam dikhao drop zone mein
    document.getElementById("selected-name").textContent = "✓ " + selectedFile.name;
    document.getElementById("submit-btn").disabled = false;
  }

  // ============================================================
  // 📤 FILE UPLOAD — 3 steps hain:
  //   1. File ko Supabase STORAGE mein save karo
  //   2. File ka public URL lo
  //   3. Us URL + info ko DATABASE mein save karo
  // ============================================================
  async function uploadFile() {
    if (!selectedFile) return;

    const uploaderInput = document.getElementById("uploader-name");
    const uploader = uploaderInput.value.trim() || "Anonymous";

    // UI ko "loading state" mein daalo
    const btn = document.getElementById("submit-btn");
    btn.disabled = true;
    btn.textContent = "UPLOADING...";
    setStatus("Uploading...");

    // Progress bar dikhao
    const progressWrap = document.getElementById("progress-wrap");
    const progressBar  = document.getElementById("progress-bar");
    progressWrap.style.display = "block";
    progressBar.style.width = "30%";

    // ── STEP 1: File ko Storage mein upload karo ──
    // `uploads` = bucket ka naam (jo tumne Supabase mein banaya)
    // `Date.now()` = unique naam dene ke liye timestamp
    const filePath = `${Date.now()}_${selectedFile.name}`;

    const { error: storageError } = await sb.storage
      .from("uploads")          // bucket: "uploads"
      .upload(filePath, selectedFile, {
        cacheControl: "3600",
        upsert: false           // same naam ki file dobara mat daalo
      });

    if (storageError) {
      setStatus("Upload failed: " + storageError.message, true);
      btn.disabled = false;
      btn.textContent = "UPLOAD";
      return;
    }

    progressBar.style.width = "65%";

    // ── STEP 2: Public URL lo ──
    // Yeh URL browser mein directly open ho sakta hai
    const { data: urlData } = sb.storage
      .from("uploads")
      .getPublicUrl(filePath);

    const publicURL = urlData.publicUrl;
    progressBar.style.width = "85%";

    // ── STEP 3: File info ko Database mein save karo ──
    // Isse hum baad mein saari files la sakte hain
    const fileType = selectedFile.type || "unknown"; // e.g. "image/png", "application/pdf"

    const { error: dbError } = await sb
      .from("files")
      .insert([{
        uploader:  uploader,
        file_name: selectedFile.name,
        file_url:  publicURL,
        file_type: fileType
        // created_at: automatic (default now())
      }]);

    if (dbError) {
      setStatus("DB error: " + dbError.message, true);
      btn.disabled = false;
      btn.textContent = "UPLOAD";
      return;
    }

    progressBar.style.width = "100%";

    // ✅ Success!
    showToast("🔥 Drop successful!");
    closeModal();
    resetModal();
    // Real-time subscription khud card add kar dega wall pe!
  }

  // ============================================================
  // 📥 Saari files database se laao aur wall pe dikhao
  // ============================================================
  async function loadFiles() {
    const { data, error } = await sb
      .from("files")
      .select("*")
      .order("created_at", { ascending: false }); // Naye pehle

    document.getElementById("loading").style.display = "none";

    if (error) {
      console.error(error);
      return;
    }

    if (data.length === 0) {
      document.getElementById("empty-state").style.display = "block";
    }

    data.forEach(file => addCard(file));
    updateCount(data.length);
  }

  // ============================================================
  // 🃏 Ek file ka card banao aur wall pe lagao
  // ============================================================
  function addCard(file) {
    // Empty state hata do
    document.getElementById("empty-state").style.display = "none";

    const wall = document.getElementById("wall");
    const card = document.createElement("div");
    card.className = "file-card";

    // File type se decide karo kaunsa preview dikhana hai
    const type = file.file_type || "";
    let previewHTML = "";

    if (type.startsWith("image/")) {
      // ── Image ──
      previewHTML = `<img class="card-preview" src="${file.file_url}" loading="lazy" alt="${file.file_name}"/>`;

    } else if (type.startsWith("video/")) {
      // ── Video ──
      previewHTML = `
        <video class="card-video" controls muted>
          <source src="${file.file_url}" type="${type}">
        </video>`;

    } else {
      // ── Baaki sab (PDF, zip, doc, etc.) ──
      const emoji = getFileEmoji(type);
      const ext   = file.file_name.split(".").pop().toUpperCase();
      previewHTML = `
        <div class="file-placeholder">
          <div class="file-emoji">${emoji}</div>
          <div class="file-ext">.${ext}</div>
        </div>`;
    }

    // File type badge (jaise "PDF", "VIDEO", "IMAGE")
    const badge = type.split("/")[1]?.toUpperCase() || "FILE";

    // Time format
    const time = new Date(file.created_at).toLocaleDateString("en-IN", {
      day: "numeric", month: "short", hour: "2-digit", minute: "2-digit"
    });

    card.innerHTML = `
      ${previewHTML}
      <div class="type-badge">${badge}</div>
      <a class="card-download" href="${file.file_url}" download target="_blank">↓ GET</a>
      <div class="card-footer">
        <div class="card-filename">${file.file_name}</div>
        <div class="card-meta">
          <span class="card-uploader">${file.uploader}</span>
          <span class="card-time">${time}</span>
        </div>
      </div>
    `;

    // Naye cards top pe aate hain
    wall.insertBefore(card, wall.firstChild);
  }

  // ============================================================
  // 📡 Real-time — jab bhi koi naya file upload kare,
  //    wall pe turant dikh jaye bina refresh kiye!
  // ============================================================
  function subscribeRealtime() {
    sb
      .channel("public:files")
      .on(
        "postgres_changes",
        { event: "INSERT", schema: "public", table: "files" },
        (payload) => {
          // Naya file aaya database mein — card banao!
          addCard(payload.new);
          updateCount();
          showToast("🆕 Koi naya drop aaya!");
        }
      )
      .subscribe();
  }

  // ============================================================
  // 🎨 Helper functions
  // ============================================================

  // File type ke hisaab se emoji
  function getFileEmoji(type) {
    if (type.includes("pdf"))         return "📄";
    if (type.includes("zip") || type.includes("rar")) return "🗜️";
    if (type.includes("audio"))       return "🎵";
    if (type.includes("text"))        return "📝";
    if (type.includes("spreadsheet") || type.includes("excel")) return "📊";
    if (type.includes("word") || type.includes("document"))     return "📃";
    return "📁";
  }

  // File count update karo header mein
  function updateCount() {
    const count = document.querySelectorAll(".file-card").length;
    document.getElementById("file-count").textContent = `${count} DROPS`;
  }

  // Status message modal mein
  function setStatus(msg, isError = false) {
    const el = document.getElementById("status-msg");
    el.textContent = msg;
    el.className = isError ? "error" : "";
  }

  // Toast notification
  let toastTimer;
  function showToast(msg, isError = false) {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = "show" + (isError ? " error-toast" : "");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.className = "", 3000);
  }

  // Modal open/close
  function openModal() {
    document.getElementById("modal-overlay").classList.add("open");
    document.getElementById("uploader-name").focus();
  }
  function closeModal() {
    document.getElementById("modal-overlay").classList.remove("open");
  }
  function resetModal() {
    document.getElementById("uploader-name").value = "";
    document.getElementById("file-input").value    = "";
    document.getElementById("selected-name").textContent = "";
    document.getElementById("progress-bar").style.width  = "0%";
    document.getElementById("progress-wrap").style.display = "none";
    document.getElementById("submit-btn").disabled = true;
    document.getElementById("submit-btn").textContent = "UPLOAD";
    setStatus("");
    selectedFile = null;
  }

  // Drag & Drop visual feedback
  const dropZone = document.getElementById("drop-zone");
  dropZone.addEventListener("dragover",  (e) => { e.preventDefault(); dropZone.classList.add("dragover"); });
  dropZone.addEventListener("dragleave", ()  => dropZone.classList.remove("dragover"));
  dropZone.addEventListener("drop",      (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    if (e.dataTransfer.files.length > 0) {
      document.getElementById("file-input").files = e.dataTransfer.files;
      onFileSelect(document.getElementById("file-input"));
    }
  });

  // Modal overlay click se close
  document.getElementById("modal-overlay").addEventListener("click", (e) => {
    if (e.target === document.getElementById("modal-overlay")) closeModal();
  });

  // ============================================================
  // 🚀 App Start!
  // ============================================================
